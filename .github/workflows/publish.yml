# Trusted Publishing (OIDC) — no API tokens in the repo.
#
# PyPI / TestPyPI pending publishers must match:
#   Repository: kinaar8340/flux_hopf_lib
#   Workflow:   publish.yml
#   Environment: pypi  |  testpypi
#
# Triggers:
#   - git tag v*           → build + publish (TestPyPI if tag contains "test", else PyPI)
#   - workflow_dispatch    → manual target selection
#
# First-time claim of a pending publisher happens on the first successful OIDC publish.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Run tests before packaging
        run: |
          pip install -e ".[dev]"
          pytest

      - name: Build package
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Store the distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: build
    # Tag contains "test" (e.g. v0.1.0-test) OR manual dispatch → testpypi
    if: >-
      (github.event_name == 'push' && contains(github.ref_name, 'test'))
      || (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi')
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/flux-hopf-lib/
    permissions:
      id-token: write
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # TestPyPI often already has a version; skip-existing avoids hard fails on re-runs
          skip-existing: true

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    # Production tags only (v0.1.0, v0.2.0) — not *test* tags
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, 'test'))
      || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/flux-hopf-lib
    permissions:
      id-token: write
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
